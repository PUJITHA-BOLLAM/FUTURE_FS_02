<!DOCTYPE html>
<html>
    <head>
        <title>Contact Form</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <br><br>
        <h2>CRM System - Lead Page</h2>
        <form id="leadForm">
            Name:
            <input type="text" id="name" placeholder=" Enter name" required><br><br>
            Email:
            <input type="email" id="email" placeholder=" Enter email" required><br><br>
            Source:
            <select id="source">
                <option>LinkedIn</option>
                <option>Instagram</option>
                <option>YouTube</option>
                <option>Twitter</option>
                <option>Others</option>
            </select>     <br>   <br>
            Phone:
            <input type="tel" maxlength="10" placeholder=" Enter mobile number" id="phone" required><br><br>
            <button type="submit">Submit</button>
        </form>
        <script src="script.js"></script>
    </body>
